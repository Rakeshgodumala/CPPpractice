<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Currency Converter — C++ CGI + Bootstrap</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container py-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="card-title text-center mb-4">Currency Converter (C++ Backend)</h3>

        <form id="convertForm" class="row g-3">
          <div class="col-12 col-md-4">
            <label for="amount" class="form-label">Amount</label>
            <input id="amount" name="amount" type="number" class="form-control" step="any" min="0" value="100" required>
          </div>

          <div class="col-12 col-md-4">
            <label for="from" class="form-label">From</label>
            <select id="from" name="from" class="form-select" required>
              <!-- a comprehensive list of currency codes -->
              <option value="USD" selected>USD — US Dollar</option>
              <option value="INR">INR — Indian Rupee</option>
              <option value="EUR">EUR — Euro</option>
              <option value="GBP">GBP — British Pound</option>
              <option value="JPY">JPY — Japanese Yen</option>
              <option value="AUD">AUD — Australian Dollar</option>
              <option value="CAD">CAD — Canadian Dollar</option>
              <option value="CHF">CHF — Swiss Franc</option>
              <option value="CNY">CNY — Chinese Yuan</option>
              <option value="SGD">SGD — Singapore Dollar</option>
              <option value="NZD">NZD — New Zealand Dollar</option>
              <option value="HKD">HKD — Hong Kong Dollar</option>
              <option value="AED">AED — UAE Dirham</option>
              <option value="SAR">SAR — Saudi Riyal</option>
              <option value="ZAR">ZAR — South African Rand</option>
              <option value="BRL">BRL — Brazilian Real</option>
              <option value="RUB">RUB — Russian Ruble</option>
              <option value="KRW">KRW — South Korean Won</option>
              <option value="MXN">MXN — Mexican Peso</option>
              <option value="TRY">TRY — Turkish Lira</option>
              <option value="PLN">PLN — Polish Zloty</option>
              <option value="IDR">IDR — Indonesian Rupiah</option>
              <option value="THB">THB — Thai Baht</option>
              <option value="MYR">MYR — Malaysian Ringgit</option>
              <option value="ILS">ILS — Israeli Shekel</option>
              <option value="EGP">EGP — Egyptian Pound</option>
              <!-- add more options if you like -->
            </select>
          </div>

          <div class="col-12 col-md-4">
            <label for="to" class="form-label">To</label>
            <select id="to" name="to" class="form-select" required>
              <!-- same list for "to" -->
              <option value="INR">INR — Indian Rupee</option>
              <option value="USD">USD — US Dollar</option>
              <option value="EUR">EUR — Euro</option>
              <option value="GBP">GBP — British Pound</option>
              <option value="JPY">JPY — Japanese Yen</option>
              <option value="AUD">AUD — Australian Dollar</option>
              <option value="CAD">CAD — Canadian Dollar</option>
              <option value="CHF">CHF — Swiss Franc</option>
              <option value="CNY">CNY — Chinese Yuan</option>
              <option value="SGD">SGD — Singapore Dollar</option>
              <option value="NZD">NZD — New Zealand Dollar</option>
              <option value="HKD">HKD — Hong Kong Dollar</option>
              <option value="AED">AED — UAE Dirham</option>
              <option value="SAR">SAR — Saudi Riyal</option>
              <option value="ZAR">ZAR — South African Rand</option>
              <option value="BRL">BRL — Brazilian Real</option>
              <option value="RUB">RUB — Russian Ruble</option>
              <option value="KRW">KRW — South Korean Won</option>
              <option value="MXN">MXN — Mexican Peso</option>
              <option value="TRY">TRY — Turkish Lira</option>
              <option value="PLN">PLN — Polish Zloty</option>
              <option value="IDR">IDR — Indonesian Rupiah</option>
              <option value="THB">THB — Thai Baht</option>
              <option value="MYR">MYR — Malaysian Ringgit</option>
              <option value="ILS">ILS — Israeli Shekel</option>
              <option value="EGP">EGP — Egyptian Pound</option>
            </select>
          </div>

          <div class="col-12 d-flex gap-2">
            <button id="convertBtn" class="btn btn-primary">Convert</button>
            <button id="convertAllBtn" class="btn btn-outline-secondary" type="button">Convert to All</button>
            <button id="clearBtn" class="btn btn-light" type="button">Clear</button>
          </div>
        </form>

        <hr>

        <div id="resultBox" class="mt-3">
          <!-- result will appear here -->
        </div>

        <div id="allResults" class="mt-3 row gy-2">
          <!-- when Convert to All is used this will contain cards -->
        </div>

      </div>
    </div>
  </div>

  <!-- Bootstrap JS & popper (CDN) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

  <script>
    const form = document.getElementById('convertForm');
    const resultBox = document.getElementById('resultBox');
    const allResults = document.getElementById('allResults');
    const convertAllBtn = document.getElementById('convertAllBtn');
    const clearBtn = document.getElementById('clearBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      allResults.innerHTML = '';
      resultBox.innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>';

      const amount = encodeURIComponent(document.getElementById('amount').value);
      const from = encodeURIComponent(document.getElementById('from').value);
      const to = encodeURIComponent(document.getElementById('to').value);

      try {
        const resp = await fetch(`/cgi-bin/converter.exe?amount=${amount}&from=${from}&to=${to}`);
        const data = await resp.json();
        if (data.status === 'ok') {
          resultBox.innerHTML = `
            <div class="alert alert-success">
              <strong>${data.amount} ${data.from}</strong> = <strong>${data.result} ${data.to}</strong>
              <div class="small text-muted mt-1">Rates are static in the C++ program — update converter.cpp to change them.</div>
            </div>`;
        } else {
          resultBox.innerHTML = `<div class="alert alert-danger">Error: ${data.error}</div>`;
        }
      } catch (err) {
        resultBox.innerHTML = `<div class="alert alert-danger">Network or server error. Make sure Apache is running and CGI module enabled.</div>`;
      }
    });

    convertAllBtn.addEventListener('click', async () => {
      allResults.innerHTML = '';
      resultBox.innerHTML = '<div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>';

      const amount = encodeURIComponent(document.getElementById('amount').value);
      const from = encodeURIComponent(document.getElementById('from').value);

      try {
        // call backend with special "to=ALL" param
        const resp = await fetch(`/cgi-bin/converter.exe?amount=${amount}&from=${from}&to=ALL`);
        const data = await resp.json();

        if (data.status === 'ok') {
          resultBox.innerHTML = `<div class="alert alert-success">Converted ${data.amount} ${data.from} to ${Object.keys(data.all).length} currencies.</div>`;

          // create cards for each currency
          const entries = Object.entries(data.all);
          entries.forEach(([code, value]) => {
            const col = document.createElement('div');
            col.className = 'col-6 col-md-4 col-lg-3';
            col.innerHTML = `
              <div class="card">
                <div class="card-body py-2">
                  <div class="fw-bold">${value} <small class="text-muted">${code}</small></div>
                </div>
              </div>`;
            allResults.appendChild(col);
          });

        } else {
          resultBox.innerHTML = `<div class="alert alert-danger">Error: ${data.error}</div>`;
        }
      } catch (err) {
        resultBox.innerHTML = `<div class="alert alert-danger">Network or server error.</div>`;
      }
    });

    clearBtn.addEventListener('click', () => {
      resultBox.innerHTML = '';
      allResults.innerHTML = '';
    });
  </script>
</body>
</html>
